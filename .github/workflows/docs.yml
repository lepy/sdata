# Baut die MkDocs-Site und deployt sie nach GitHub Pages (Source: GitHub Actions).
#
# Kein Test-CI: die Testsuite läuft ausschließlich lokal (ci/local-ci.sh).
# Dieser Workflow baut nur die Doku und liefert die unter master-Root gepflegten
# Assets (ns/context.jsonld, paper/, ipynb/) unverändert an denselben URLs mit aus.
name: docs

on:
  push:
    branches: [master]
    paths:
      - docs/**
      - mkdocs.yml
      - ns/**
      - paper/**
      - ipynb/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs toolchain + package
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e ".[parquet]"
      - name: Build site
        run: mkdocs build
      - name: Preserve legacy static assets (namespace, paper, slides)
        run: cp -r ns paper ipynb site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
